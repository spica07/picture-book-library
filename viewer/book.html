<body>
<!-- 공용 셸: ?book=책ID 에 따라 storybook.js 가 books/책ID.js 를 로드해 렌더링한다 -->
<div id="app"></div>
<script>
// PWA: 서비스 워커 등록 (https/localhost에서만 동작, file:// 에서는 건너뜀)
if ("serviceWorker" in navigator && location.protocol !== "file:") {
  navigator.serviceWorker.register("sw.js");
}
</script>
<script src="common/storybook.js"></script>
