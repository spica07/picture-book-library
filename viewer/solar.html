<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반짝반짝 태양계 친구들</title>
<meta name="theme-color" content="#ffd45a">
<link rel="icon" href="icons/icon-192.png">
<style>
:root {
  color-scheme: light;
  --bg: #f6fbff;
  --panel: #ffffff;
  --ink: #172033;
  --muted: #607086;
  --line: #d8e4ee;
  --sun: #ffd45a;
  --sun-strong: #f5aa18;
  --sky: #1f8db8;
  --leaf: #278c67;
  --coral: #e65f49;
  --shadow: 0 16px 40px rgba(23, 32, 51, 0.12);
}
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  background:
    linear-gradient(180deg, rgba(255, 212, 90, 0.22), rgba(246, 251, 255, 0) 260px),
    var(--bg);
  color: var(--ink);
  font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", system-ui, sans-serif;
}
a {
  color: inherit;
  text-decoration: none;
}
button {
  font: inherit;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 16px;
  min-height: 62px;
  padding: 10px clamp(16px, 4vw, 42px);
  background: rgba(246, 251, 255, 0.92);
  border-bottom: 1px solid rgba(216, 228, 238, 0.9);
  backdrop-filter: blur(14px);
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  font-weight: 800;
}
.brand-mark {
  display: grid;
  width: 34px;
  height: 34px;
  place-items: center;
  border: 2px solid #1d2738;
  border-radius: 50%;
  background: var(--sun);
  color: #1d2738;
  font-size: 20px;
  line-height: 1;
}
.brand span:last-child {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.topbar-nav {
  display: flex;
  gap: 8px;
  margin-left: auto;
}
.nav-link,
.icon-button,
.control-button,
.book-button,
.card-button {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  color: var(--ink);
  cursor: pointer;
}
.nav-link {
  padding: 9px 12px;
  color: var(--muted);
  font-size: 14px;
  font-weight: 700;
}
.wrap {
  width: min(1320px, 100%);
  margin: 0 auto;
  padding: clamp(18px, 4vw, 36px);
}
.reader-head {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 16px;
  align-items: end;
  margin-bottom: 18px;
}
.eyebrow {
  margin: 0 0 8px;
  color: var(--sky);
  font-size: 14px;
  font-weight: 800;
}
h1 {
  margin: 0;
  font-size: clamp(30px, 5vw, 58px);
  line-height: 1.04;
  letter-spacing: 0;
}
.summary {
  margin: 10px 0 0;
  color: var(--muted);
  font-size: clamp(15px, 2vw, 18px);
  line-height: 1.55;
}
.stats {
  display: grid;
  grid-template-columns: repeat(3, auto);
  gap: 8px;
}
.stat {
  min-width: 86px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.82);
  text-align: center;
}
.stat strong {
  display: block;
  font-size: 20px;
}
.stat span {
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}
.reader-shell {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr);
  gap: 16px;
  align-items: stretch;
}
.book-list {
  display: grid;
  align-content: start;
  gap: 8px;
  max-height: calc(100vh - 160px);
  overflow: auto;
  padding-right: 4px;
}
.book-button {
  display: grid;
  grid-template-columns: 58px minmax(0, 1fr);
  gap: 10px;
  padding: 8px;
  text-align: left;
}
.book-button[aria-current="true"] {
  border-color: #1d2738;
  box-shadow: 0 0 0 2px rgba(255, 212, 90, 0.95) inset;
}
.book-thumb {
  width: 58px;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  border-radius: 6px;
  background: #e7eef5;
}
.book-meta {
  min-width: 0;
}
.book-meta small {
  display: block;
  color: var(--sky);
  font-weight: 800;
}
.book-meta strong,
.book-meta span {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.book-meta strong {
  margin-top: 2px;
  font-size: 15px;
}
.book-meta span {
  margin-top: 3px;
  color: var(--muted);
  font-size: 12px;
}
.stage {
  display: grid;
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.stage-top {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
}
.stage-title {
  min-width: 0;
}
.stage-title p,
.stage-title h2 {
  margin: 0;
}
.stage-title p {
  color: var(--sky);
  font-size: 13px;
  font-weight: 800;
}
.stage-title h2 {
  overflow-wrap: anywhere;
  font-size: clamp(19px, 2.6vw, 30px);
  letter-spacing: 0;
}
.progress-label {
  color: var(--muted);
  font-size: 14px;
  font-weight: 800;
  white-space: nowrap;
}
.progress {
  height: 6px;
  background: #edf3f7;
}
.progress span {
  display: block;
  width: 0;
  height: 100%;
  background: linear-gradient(90deg, var(--sun-strong), var(--leaf), var(--sky));
}
.image-frame {
  display: grid;
  place-items: center;
  min-height: 360px;
  padding: clamp(10px, 2vw, 18px);
  background: #101724;
}
.image-frame img {
  display: block;
  width: min(100%, 1180px);
  aspect-ratio: 16 / 9;
  max-height: calc(100vh - 270px);
  object-fit: contain;
  border-radius: 6px;
  background: #20283a;
}
.caption-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 14px;
  align-items: center;
  padding: 14px 16px;
  border-top: 1px solid var(--line);
}
.caption {
  min-width: 0;
}
.caption strong,
.caption span {
  display: block;
}
.caption strong {
  font-size: 17px;
}
.caption span {
  margin-top: 3px;
  color: var(--muted);
  line-height: 1.45;
}
.controls {
  display: flex;
  gap: 8px;
}
.control-button,
.icon-button {
  min-width: 42px;
  min-height: 42px;
  padding: 0 14px;
  font-weight: 800;
}
.control-button.primary {
  border-color: #1d2738;
  background: var(--sun);
}
.thumb-strip {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 10px 12px 14px;
  border-top: 1px solid var(--line);
  background: #f9fcff;
}
.page-thumb {
  flex: 0 0 92px;
  padding: 0;
  border: 2px solid transparent;
  border-radius: 8px;
  background: transparent;
  cursor: pointer;
}
.page-thumb[aria-current="true"] {
  border-color: var(--coral);
}
.page-thumb img {
  display: block;
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  border-radius: 5px;
  background: #e7eef5;
}
.library {
  margin-top: 34px;
}
.section-title {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}
.section-title h2 {
  margin: 0;
  font-size: 25px;
  letter-spacing: 0;
}
.section-title p {
  margin: 0;
  color: var(--muted);
}
.cards {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
}
.book-card {
  display: grid;
  gap: 10px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
}
.book-card img {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  border-radius: 6px;
  background: #e7eef5;
}
.book-card small {
  color: var(--sky);
  font-weight: 800;
}
.book-card h3 {
  margin: 2px 0 0;
  font-size: 18px;
  letter-spacing: 0;
}
.book-card p {
  margin: 0;
  color: var(--muted);
  line-height: 1.45;
}
.card-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 38px;
  padding: 0 12px;
  background: #fff8dc;
  font-weight: 800;
}
@media (max-width: 980px) {
  .reader-head,
  .reader-shell {
    grid-template-columns: 1fr;
  }
  .stats {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
  .book-list {
    grid-auto-flow: column;
    grid-auto-columns: minmax(240px, 1fr);
    max-height: none;
    overflow-x: auto;
    padding: 0 0 4px;
  }
  .cards {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}
@media (max-width: 640px) {
  .topbar {
    min-height: 56px;
    padding-inline: 12px;
  }
  .brand-mark {
    width: 30px;
    height: 30px;
  }
  .nav-link {
    padding: 8px 10px;
  }
  .wrap {
    padding: 16px 12px 28px;
  }
  .stats {
    gap: 6px;
  }
  .stat {
    min-width: 0;
    padding: 8px 6px;
  }
  .stage-top,
  .caption-row {
    grid-template-columns: 1fr;
  }
  .caption-row {
    gap: 10px;
  }
  .controls {
    width: 100%;
  }
  .control-button {
    flex: 1;
  }
  .image-frame {
    min-height: 220px;
    padding: 8px;
  }
  .image-frame img {
    max-height: none;
  }
  .cards {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<header class="topbar">
  <a class="brand" href="../index.html">
    <span class="brand-mark" aria-hidden="true">•</span>

  </a>
  <nav class="topbar-nav" aria-label="페이지 이동">
    <a class="nav-link" href="index.html">전체 책장</a>
  </nav>
</header>

<main class="wrap">
  <section aria-labelledby="page-title">
    <div class="reader-head">
      <div>
        <p class="eyebrow">태양계 그림책 웹 버전</p>
        <h1 id="page-title">반짝반짝 태양계 친구들</h1>
        <p class="summary">태양부터 명왕성, 통합 운동회까지 11권을 한 화면에서 바로 넘겨 볼 수 있습니다.</p>
      </div>
      <div class="stats" aria-label="시리즈 요약">
        <div class="stat"><strong>11</strong><span>권</span></div>
        <div class="stat"><strong>191</strong><span>그림</span></div>
        <div class="stat"><strong>16:9</strong><span>화면</span></div>
      </div>
    </div>

    <div class="reader-shell">
      <aside class="book-list" id="bookList" aria-label="책 선택"></aside>

      <section class="stage" aria-label="그림책 리더">
        <div class="stage-top">
          <div class="stage-title">
            <p id="stageVolume"></p>
            <h2 id="stageTitle"></h2>
          </div>
          <div class="progress-label" id="pageCount"></div>
        </div>
        <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
        <div class="image-frame">
          <img id="pageImage" alt="">
        </div>
        <div class="caption-row">
          <div class="caption">
            <strong id="captionTitle"></strong>
            <span id="captionText"></span>
          </div>
          <div class="controls" aria-label="페이지 이동">
            <button class="control-button" id="prevButton" type="button">← 이전</button>
            <button class="control-button primary" id="nextButton" type="button">다음 →</button>
          </div>
        </div>
        <div class="thumb-strip" id="thumbStrip" aria-label="장면 선택"></div>
      </section>
    </div>
  </section>

  <section class="library" aria-labelledby="library-title">
    <div class="section-title">
      <h2 id="library-title">책 목록</h2>
      <p>표지와 장면을 PNG 원본으로 표시합니다.</p>
    </div>
    <div class="cards" id="cards"></div>
  </section>
</main>

const state = {
  bookIndex: 0,
  pageIndex: 0
};

const els = {
  bookList: document.getElementById("bookList"),
  cards: document.getElementById("cards"),
  stageVolume: document.getElementById("stageVolume"),
  stageTitle: document.getElementById("stageTitle"),
  pageCount: document.getElementById("pageCount"),
  progressBar: document.getElementById("progressBar"),
  pageImage: document.getElementById("pageImage"),
  captionTitle: document.getElementById("captionTitle"),
  captionText: document.getElementById("captionText"),
  prevButton: document.getElementById("prevButton"),
  nextButton: document.getElementById("nextButton"),
  thumbStrip: document.getElementById("thumbStrip")
};

function pagesFor(volume) {
  return [volume.cover].concat(volume.scenes);
}

function imageUrl(file) {
  return IMAGE_BASE + file;
}

function pageLabel(volume, pageIndex) {
  if (pageIndex === 0) return volume.volume + " 표지";
  return volume.volume + " " + String(pageIndex).padStart(2, "0") + "장";
}

function setHash() {
  const volume = volumes[state.bookIndex];
  history.replaceState(null, "", "#" + volume.id + "/" + state.pageIndex);
}

function restoreHash() {
  const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
  if (!raw) return;
  const parts = raw.split("/");
  const index = volumes.findIndex((volume) => volume.id === parts[0]);
  if (index < 0) return;
  const page = Math.max(0, Number.parseInt(parts[1] || "0", 10) || 0);
  state.bookIndex = index;
  state.pageIndex = Math.min(page, pagesFor(volumes[index]).length - 1);
}

function selectBook(bookIndex, pageIndex) {
  state.bookIndex = Math.max(0, Math.min(bookIndex, volumes.length - 1));
  state.pageIndex = Math.max(0, Math.min(pageIndex || 0, pagesFor(volumes[state.bookIndex]).length - 1));
  render();
}

function move(delta) {
  const volume = volumes[state.bookIndex];
  const pages = pagesFor(volume);
  const nextPage = state.pageIndex + delta;

  if (nextPage >= 0 && nextPage < pages.length) {
    state.pageIndex = nextPage;
  } else if (delta > 0 && state.bookIndex < volumes.length - 1) {
    state.bookIndex += 1;
    state.pageIndex = 0;
  } else if (delta < 0 && state.bookIndex > 0) {
    state.bookIndex -= 1;
    state.pageIndex = pagesFor(volumes[state.bookIndex]).length - 1;
  }

  render();
}

function renderBookList() {
  els.bookList.innerHTML = volumes.map((volume, index) => {
    const current = index === state.bookIndex ? ' aria-current="true"' : "";
    return [
      '<button class="book-button" type="button" data-book="' + index + '"' + current + '>',
      '  <img class="book-thumb" src="' + imageUrl(volume.cover) + '" alt="">',
      '  <span class="book-meta">',
      '    <small>' + volume.volume + " · " + (volume.scenes.length + 1) + "장</small>",
      '    <strong>' + volume.title + "</strong>",
      '    <span>' + volume.lesson + "</span>",
      "  </span>",
      "</button>"
    ].join("");
  }).join("");
}

function renderCards() {
  els.cards.innerHTML = volumes.map((volume, index) => {
    return [
      '<article class="book-card">',
      '  <img src="' + imageUrl(volume.cover) + '" alt="' + volume.title + ' 표지">',
      "  <div>",
      "    <small>" + volume.volume + " · " + (volume.scenes.length + 1) + "장</small>",
      "    <h3>" + volume.title + "</h3>",
      "  </div>",
      "  <p>" + volume.lesson + "</p>",
      '  <button class="card-button" type="button" data-card-book="' + index + '">바로 보기</button>',
      "</article>"
    ].join("");
  }).join("");
}

function renderThumbs(volume, pages) {
  els.thumbStrip.innerHTML = pages.map((file, index) => {
    const current = index === state.pageIndex ? ' aria-current="true"' : "";
    return [
      '<button class="page-thumb" type="button" data-page="' + index + '"' + current + ' aria-label="' + pageLabel(volume, index) + '">',
      '  <img src="' + imageUrl(file) + '" alt="">',
      "</button>"
    ].join("");
  }).join("");
}

function renderStage() {
  const volume = volumes[state.bookIndex];
  const pages = pagesFor(volume);
  const file = pages[state.pageIndex];
  const label = pageLabel(volume, state.pageIndex);

  els.stageVolume.textContent = volume.volume + " · " + volume.lesson;
  els.stageTitle.textContent = volume.title;
  els.pageCount.textContent = (state.pageIndex + 1) + " / " + pages.length;
  els.progressBar.style.width = ((state.pageIndex + 1) / pages.length * 100) + "%";
  els.pageImage.src = imageUrl(file);
  els.pageImage.alt = volume.title + " " + label;
  els.captionTitle.textContent = label;
  els.captionText.textContent = state.pageIndex === 0 ? volume.lesson : volume.title + "의 " + state.pageIndex + "번째 장면";
  els.prevButton.disabled = state.bookIndex === 0 && state.pageIndex === 0;
  els.nextButton.disabled = state.bookIndex === volumes.length - 1 && state.pageIndex === pages.length - 1;
  renderThumbs(volume, pages);
}

function bindEvents() {
  els.prevButton.addEventListener("click", () => move(-1));
  els.nextButton.addEventListener("click", () => move(1));
  els.bookList.addEventListener("click", (event) => {
    const button = event.target.closest("[data-book]");
    if (!button) return;
    selectBook(Number(button.dataset.book), 0);
  });
  els.cards.addEventListener("click", (event) => {
    const button = event.target.closest("[data-card-book]");
    if (!button) return;
    selectBook(Number(button.dataset.cardBook), 0);
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  els.thumbStrip.addEventListener("click", (event) => {
    const button = event.target.closest("[data-page]");
    if (!button) return;
    state.pageIndex = Number(button.dataset.page);
    render();
  });
  window.addEventListener("keydown", (event) => {
    if (event.key === "ArrowLeft") move(-1);
    if (event.key === "ArrowRight") move(1);
  });
  window.addEventListener("hashchange", () => {
    restoreHash();
    render();
  });
}

function render() {
  renderBookList();
  renderStage();
  setHash();
}

restoreHash();
renderCards();
bindEvents();
render();
</script>
